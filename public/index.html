<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝙺𝚄𝚁𝙰𝙿𝙸𝙺𝙰 | 𝙱𝚁𝙰𝚃 𝙶𝙴𝙽</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Poppins:wght@300;400;600;700&family=Permanent+Marker&family=Righteous&family=VT323&family=Bangers&family=Black+Ops+One&family=Creepster&family=Orbitron:wght@700&family=Press+Start+2P&family=Rock+Salt&family=Special+Elite&family=Pacifico&family=Dancing+Script:wght@700&family=Shadows+Into+Light&family=Kaushan+Script&family=Metal+Mania&family=Monoton&family=Eater&family=Nosifer&family=Lobster&family=Abril+Fatface&family=UnifrakturMaguntia&family=Cinzel+Decorative:wght@700&family=Faster+One&family=Fredericka+the+Great&family=Pirata+One&family=Rubik+Glitch&family=Bungee+Shade&family=Alumni+Sans+Inline+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --accent: #ff0000;
            --gold: #ffcc00;
            --blue: #0095f6;
            --bg: #05070a; 
            --glass: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 204, 0, 0.15);
        }
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Poppins', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none;
        }
        input, textarea, select { user-select: text; }
        body { background-color: var(--bg); color: #fff; overflow-x: hidden; padding-bottom: 50px; cursor: pointer; }
        .hero { position: relative; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .cover-area {
            width: 100%; height: 160px; 
            background: linear-gradient(to bottom, transparent, var(--bg)), url('https://i.gifer.com/94k3.gif');
            background-size: cover; background-position: center;
            border-bottom: 2px solid var(--accent);
        }
        .profile-container { margin-top: -50px; text-align: center; z-index: 10; margin-bottom: 30px; }
        .profile-hex {
            width: 100px; height: 100px; padding: 3px; background: var(--bg);
            border-radius: 50%; display: inline-block;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3); border: 2px solid var(--gold);
        }
        .profile-hex img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .name-wrapper { 
            margin-top: 10px; 
            color: var(--gold); 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .wave-text { 
            display: flex; 
            font-family: 'Syncopate', sans-serif; 
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: 4px;
        }
        .wave-text span {
            display: inline-block;
            animation: waveAnim 2s infinite ease-in-out;
            animation-delay: calc(0.1s * var(--i));
        }
        @keyframes waveAnim {
            0%, 40%, 100% { transform: translateY(0); }
            20% { transform: translateY(-10px); color: var(--accent); text-shadow: 0 0 10px var(--accent); }
        }
        .verified-badge {
            color: var(--blue);
            font-size: 1.1rem;
            margin-top: -2px;
            filter: drop-shadow(0 0 5px rgba(0, 149, 246, 0.5));
        }
        section { padding: 0 5%; max-width: 1200px; margin: 0 auto; width: 100%; }
        .section-header {
            font-family: 'Syncopate', sans-serif; font-size: 0.7rem; font-weight: 700;
            color: var(--gold); margin-bottom: 20px; display: flex; align-items: center; gap: 10px;
            text-transform: uppercase;
        }
        .section-header::after { content: ""; height: 1px; flex-grow: 1; background: linear-gradient(to right, var(--gold), transparent); opacity: 0.2; }
        .card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .form-group { margin-bottom: 15px; }
        .form-label { font-family: 'Syncopate', sans-serif; font-size: 0.55rem; font-weight: 700; color: #888; display: block; margin-bottom: 8px; }
        textarea {
            width: 100%; height: 100px; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255,255,255,0.05);
            padding: 12px; border-radius: 8px; color: #fff; font-size: 1rem; outline: none;
            transition: 0.3s; resize: none;
        }
        textarea:focus { border-color: var(--accent); background: rgba(255, 0, 0, 0.05); }
        .toolbar { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        select { 
            width: 100%; padding: 12px; background: #111; border: 1px solid rgba(255,255,255,0.05); 
            color: #fff; border-radius: 8px; font-size: 0.85rem; cursor: pointer; outline: none;
        }
        select:focus { border-color: var(--accent); }
        .btn-execute {
            width: 100%; padding: 15px; border-radius: 8px; border: 1px solid var(--gold);
            background: transparent; color: var(--gold); font-family: 'Syncopate', sans-serif;
            font-size: 0.7rem; font-weight: 700; cursor: pointer; transition: 0.3s;
            margin-top: 10px; text-transform: uppercase;
        }
        .btn-execute:hover { background: var(--gold); color: #000; box-shadow: 0 0 20px rgba(255, 204, 0, 0.3); }
        .board-frame {
            margin-top: 20px; padding: 10px; background: #111;
            border-radius: 12px; border: 1px solid #333;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }
        .canvas-container {
            border: 6px solid #ffffff; background: #ffffff; border-radius: 4px; overflow: hidden;
        }
        canvas { display: block; width: 100%; height: auto; }
        #liveClock { font-family: 'Syncopate', sans-serif; font-size: 0.6rem; font-weight: 700; color: var(--gold); opacity: 0.5; margin-top: 20px; text-align: center; }
    </style>
</head>
<body onclick="playMusic()">
    <audio id="bgMusic" loop><source src="kurapika.mp3" type="audio/mpeg"></audio>
    <header class="hero">
        <div class="cover-area"></div>
        <div class="profile-container">
            <div class="profile-hex"><img src="https://i.gifer.com/94k1.gif"></div>
            <div class="name-wrapper">
                <div class="wave-text">
                    <span style="--i:1">K</span><span style="--i:2">U</span><span style="--i:3">R</span><span style="--i:4">A</span><span style="--i:5">P</span><span style="--i:6">I</span><span style="--i:7">K</span><span style="--i:8">A</span>
                </div>
                <i class="fas fa-check-circle verified-badge"></i>
            </div>
            <p style="font-size: 0.6rem; color: var(--accent); letter-spacing: 2px; margin-top: 5px; font-family: 'Syncopate'; font-weight: 700;">GØDZ-MØDZ - UGK</p>
        </div>
    </header>
    <section>
        <div class="section-header">BRAT GENERATOR</div>
        <div class="card">
            <div class="form-group">
                <label class="form-label">YOUR TEXT</label>
                <textarea id="textInput" placeholder="TYPE YOUR TEXT HERE..."></textarea>
            </div>
            <div class="toolbar">
                <div class="form-group">
                    <label class="form-label">FONT LIST</label>
                    <select id="fontSelect">
                        <option value="'Righteous', cursive">Righteous</option>
                        <option value="'Orbitron', sans-serif">Orbitron</option>
                        <option value="'Syncopate', sans-serif">Syncopate</option>
                        <option value="'VT323', monospace">Pixel VT323</option>
                        <option value="'Press Start 2P', cursive">8-Bit Gaming</option>
                        <option value="'Monoton', cursive">Neon Monoton</option>
                        <option value="'Permanent Marker', cursive">Permanent Marker</option>
                        <option value="'Rock Salt', cursive">Rock Salt</option>
                        <option value="'Pacifico', cursive">Pacifico</option>
                        <option value="'Dancing Script', cursive">Dancing Script</option>
                        <option value="'Creepster', cursive">Creepster</option>
                        <option value="'Metal Mania', cursive">Metal Mania</option>
                        <option value="'Nosifer', cursive">Nosifer</option>
                        <option value="'Cinzel Decorative', serif">Cinzel Decorative</option>
                        <option value="'Pirata One', cursive">Pirata One</option>
                        <option value="'Special Elite', cursive">Typewriter</option>
                        <option value="'Bungee Shade', cursive">Bungee Shade</option>
                        <option value="'Rubik Glitch', cursive">Rubik Glitch</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">TYLE_COLOR</label>
                    <select id="colorSelect">
                        <option value="#000000">VOID BLACK</option>
                        <option value="#ff0000">SCARLET RED</option>
                        <option value="#ffcc00">GOLD AURA</option>
                        <option value="#0084ff">SYSTEM BLUE</option>
                        <option value="#00ff00">NEON GREEN</option>
                    </select>
                </div>
            </div>
            <button class="btn-execute" onclick="downloadImage()">DOWNLOAD PNG</button>
        </div>
        <div class="section-header">OUTPUT PREVIEW</div>
        <div class="board-frame">
            <div class="canvas-container">
                <canvas id="boardCanvas"></canvas>
            </div>
        </div>
        <div id="liveClock">00:00:00 PM</div>
    </section>
    <script>
        const music = document.getElementById('bgMusic');
        let isStarted = false;
        function playMusic() { if (!isStarted) { music.play().then(() => isStarted = true).catch(e => {}); } }
        function updateClock() { document.getElementById('liveClock').innerText = new Date().toLocaleTimeString(); }
        setInterval(updateClock, 1000); updateClock();
        const canvas = document.getElementById('boardCanvas');
        const ctx = canvas.getContext('2d');
        const textInput = document.getElementById('textInput');
        const fontSelect = document.getElementById('fontSelect');
        const colorSelect = document.getElementById('colorSelect');
        canvas.width = 1200; 
        canvas.height = 850;
        function draw() {
            ctx.fillStyle = "#ffffff"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            const text = textInput.value.trim(); 
            if (!text) return;
            ctx.fillStyle = colorSelect.value; 
            ctx.font = `95px ${fontSelect.value}`;
            ctx.textAlign = "center"; 
            ctx.textBaseline = "middle";
            const lines = text.split('\n'); 
            const lineHeight = 115;
            const startY = (canvas.height / 2) - ((lines.length - 1) * lineHeight / 2);
            lines.forEach((line, i) => { 
                ctx.fillText(line, canvas.width / 2, startY + (i * lineHeight)); 
            });
        }
        textInput.addEventListener('input', draw);
        fontSelect.addEventListener('change', draw);
        colorSelect.addEventListener('change', draw);
        function downloadImage() {
            const link = document.createElement('a');
            link.download = `godz_brat_${Date.now()}.png`; 
            link.href = canvas.toDataURL(); 
            link.click();
        }
        window.onload = draw;
    </script>
</body>
</html>
